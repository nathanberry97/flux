---
name: Lint flux

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install go
        uses: actions/setup-go@v6
        with:
            go-version: 1.25.7

      - name: Install pre-commit Dependencies
        run: |
            pip install pre-commit
            make setup

      - name: Validate pre-commit
        run: |
            pre-commit run --all
...
